services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: focuspocus-dev
    ports:
      - '${NUXT_PORT:-3000}:3000'
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NUXT_DATABASE_PATH: ${NUXT_DATABASE_PATH:-server/database/focuspocus.sqlite}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      - .:/app
      - focuspocus_node_modules:/app/node_modules
      - focuspocus_nuxt:/app/.nuxt
    working_dir: /app
    command: npm run dev:docker

volumes:
  focuspocus_node_modules:
  focuspocus_nuxt:
